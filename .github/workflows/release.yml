name: Release
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      image: ${{ steps.image_name.outputs.image }}
    steps:
      - uses: actions/checkout@v6
      - id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - id: image_name
        shell: bash
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false

  build-frontend:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install
        working-directory: frontend

      - name: Build frontend
        run: pnpm build
        working-directory: frontend

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build
          if-no-files-found: error

  build-rust-release-assets:
    needs:
      - create-release
      - build-frontend
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: rs-ibed.exe
            cli_name: upload.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: rs-ibed
            cli_name: upload
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: rs-ibed
            cli_name: upload

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Download frontend build artifact
        uses: actions/download-artifact@v5
        with:
          name: frontend-build
          path: frontend/build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build CLI Tool
        run: cargo build --release --target ${{ matrix.target }} --bin upload

      - name: Package Artifacts
        shell: bash
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          TARGET=${{ matrix.target }}

          cp target/$TARGET/release/${{ matrix.artifact_name }} rs-ibed-v$VERSION-$TARGET${{ matrix.os == 'windows-latest' && '.exe' || '' }}
          cp target/$TARGET/release/${{ matrix.cli_name }} upload-v$VERSION-$TARGET${{ matrix.os == 'windows-latest' && '.exe' || '' }}

      - name: Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rs-ibed-v${{ needs.create-release.outputs.version }}-${{ matrix.target }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}
            upload-v${{ needs.create-release.outputs.version }}-${{ matrix.target }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}

  build-rust-linux-assets:
    needs:
      - create-release
      - build-frontend
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            docker_artifact_name: docker-binary-amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            docker_artifact_name: docker-binary-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Download frontend build artifact
        uses: actions/download-artifact@v5
        with:
          name: frontend-build
          path: frontend/build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Linux release binaries
        run: |
          cargo build --release --target ${{ matrix.target }} --bin rs-ibed
          cargo build --release --target ${{ matrix.target }} --bin upload

      - name: Package release assets
        shell: bash
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          TARGET=${{ matrix.target }}

          cp target/$TARGET/release/rs-ibed rs-ibed-v$VERSION-$TARGET
          cp target/$TARGET/release/upload upload-v$VERSION-$TARGET

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rs-ibed-v${{ needs.create-release.outputs.version }}-${{ matrix.target }}
            upload-v${{ needs.create-release.outputs.version }}-${{ matrix.target }}

      - name: Prepare Docker binary artifact
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/rs-ibed dist/rs-ibed

      - name: Upload Docker binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.docker_artifact_name }}
          path: dist/rs-ibed
          if-no-files-found: error
          retention-days: 1

  build-docker:
    needs:
      - create-release
      - build-rust-linux-assets
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            arch: amd64
            binary_artifact: docker-binary-amd64
          - os: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
            binary_artifact: docker-binary-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Download prebuilt binary
        uses: actions/download-artifact@v5
        with:
          name: ${{ matrix.binary_artifact }}
          path: dist

      - name: Make binary executable
        shell: bash
        run: chmod +x dist/rs-ibed

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.create-release.outputs.image }}
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ needs.create-release.outputs.version }}
            type=raw,value=${{ needs.create-release.outputs.version }}

      - name: Build and push Docker image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ needs.create-release.outputs.image }},push-by-digest=true,name-canonical=true,push=true

      - name: Export image digest
        shell: bash
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-docker:
    needs:
      - create-release
      - build-docker
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v5
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.create-release.outputs.image }}
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ needs.create-release.outputs.version }}
            type=raw,value=${{ needs.create-release.outputs.version }}

      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        shell: bash
        run: |
          tag_args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            tag_args+=(--tag "$tag")
          done <<'EOF'
          ${{ steps.meta.outputs.tags }}
          EOF

          digest_refs=()
          for digest in *; do
            digest_refs+=("${{ needs.create-release.outputs.image }}@sha256:$digest")
          done

          docker buildx imagetools create "${tag_args[@]}" "${digest_refs[@]}"

      - name: Inspect image
        shell: bash
        run: docker buildx imagetools inspect ${{ needs.create-release.outputs.image }}:v${{ needs.create-release.outputs.version }}
