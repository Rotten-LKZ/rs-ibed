name: Release
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false

  build-rust:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: rs-ibed
            cli_name: upload
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: rs-ibed.exe
            cli_name: upload.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: rs-ibed
            cli_name: upload
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: rs-ibed
            cli_name: upload

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build CLI Tool
        run: cargo build --release --target ${{ matrix.target }} --bin upload

      - name: Package Artifacts
        shell: bash
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          TARGET=${{ matrix.target }}
          
          # Rename main application
          cp target/$TARGET/release/${{ matrix.artifact_name }} rs-ibed-v$VERSION-$TARGET${{ matrix.os == 'windows-latest' && '.exe' || '' }}
          
          # Rename CLI tools
          cp target/$TARGET/release/${{ matrix.cli_name }} upload-v$VERSION-$TARGET${{ matrix.os == 'windows-latest' && '.exe' || '' }}

      - name: Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rs-ibed-v${{ needs.create-release.outputs.version }}-${{ matrix.target }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}
            upload-v${{ needs.create-release.outputs.version }}-${{ matrix.target }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}

  build-docker:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/rs-ibed
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ needs.create-release.outputs.version }}
            type=raw,value=${{ needs.create-release.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
