services:
  postgres:
    image: postgres:17-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ibed
      POSTGRES_PASSWORD: ibed-password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    image: ghcr.io/rotten-lkz/rs-ibed:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      IMG_AUTH_TOKEN: change-me
      IMG_JWT_SECRET: change-me-too
      IMG_DATABASE_URL: postgres://ibed:ibed-password@postgres:5432/ibed
    command: ["--config", "/app/config.toml"]
    ports:
      - "3000:3000"
    volumes:
      - ../deploy/config.toml:/app/config.toml:ro
      - app-data:/app/data

volumes:
  postgres-data:
  app-data:
